name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32-x64
            rust_target: x86_64-pc-windows-msvc
          - os: macos-latest
            platform: darwin-arm64
            rust_target: aarch64-apple-darwin
          - os: ubuntu-latest
            platform: linux-x64
            rust_target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/bridge
            apps/desktop/src-tauri

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release artifacts
        run: bun run ci:release -- --platform ${{ matrix.platform }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qenex-${{ matrix.platform }}
          path: dist-artifacts/
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Downloads

            Pick the asset matching your platform and use case:

            | Product | File pattern | Usage |
            |---------|--------------|-------|
            | Integrated server | `qenex-server-*` | Extract and run `start.ps1` (Windows) or `start.sh` (macOS/Linux), then open `http://localhost:8000` |
            | VS Code extension | `qenex-vscode-*.vsix` | VS Code → Extensions → Install from VSIX |
            | JetBrains plugin | `qenex-jetbrains-*.zip` | IDE → Settings → Plugins → Install from disk |
            | Desktop app | `qenex-desktop-*` | Run the installer for your OS |

            Each platform build (`win32-x64`, `darwin-arm64`, `linux-x64`) includes all four products.
          files: dist-artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
