<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Center</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("qenex:boot-theme");
          if (!raw) return;
          var t = JSON.parse(raw);
          if (!t || !t.background) return;
          var s = document.documentElement.style;
          s.backgroundColor = t.background;
          if (t.foreground) s.color = t.foreground;
          if (t.colorScheme) {
            s.colorScheme = t.colorScheme;
            document.documentElement.dataset.colorScheme = t.colorScheme;
            document.documentElement.classList.toggle(
              "dark",
              t.colorScheme === "dark",
            );
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
