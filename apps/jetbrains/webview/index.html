<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qenex</title>
    <!-- 首屏用 boot 缓存 / CSS 变量铺底；未就绪时保持透明让 IDE 色透出 -->
    <style>
      html,
      body,
      #root {
        margin: 0;
        height: 100%;
        background: var(--background, transparent);
        color: var(--foreground, inherit);
      }
    </style>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("qenex:boot-theme");
          if (!raw) return;
          var t = JSON.parse(raw);
          if (!t || !t.background) return;
          var s = document.documentElement.style;
          s.backgroundColor = t.background;
          if (t.foreground) s.color = t.foreground;
          if (t.colorScheme) s.colorScheme = t.colorScheme;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
